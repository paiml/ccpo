# Default configuration for Claude Code Proxy for Other APIs (ccpo)
# This file is embedded in the binary and provides sensible defaults

[server]
host = "0.0.0.0"
port = 8082
log_level = "info"  # trace, debug, info, warn, error
log_format = "pretty"  # pretty or json

[providers]
preferred = "openai"  # openai, google, or ollama

[providers.openai]
api_key = "${OPENAI_API_KEY}"
timeout_secs = 30
max_retries = 3

[providers.google]
api_key = "${GEMINI_API_KEY}"
timeout_secs = 30
max_retries = 3

[providers.ollama]
api_base = "http://localhost:11434"
timeout_secs = 60
max_retries = 3

[models]
big = "o3-mini"    # Maps Claude Sonnet
small = "o3-mini"  # Maps Claude Haiku

[models.openai_list]
supported = [
    "o3-mini",
    "o1",
    "o1-preview",
    "o1-mini",
    "gpt-4o",
    "gpt-4o-mini",
    "gpt-4-turbo",
    "gpt-4-turbo-preview",
    "gpt-4-1106-preview",
    "gpt-4",
    "gpt-4.1",
    "gpt-3.5-turbo",
    "gpt-3.5-turbo-16k",
]

[models.gemini_list]
supported = [
    "gemini-2.5-pro-preview-03-25",
    "gemini-2.0-flash",
]

[models.ollama_list]
supported = [
    "llama3",
    "llama3:8b",
    "llama3:70b",
    "llama3.2",
    "llama3.2:1b",
    "llama3.2:3b",
    "mistral",
    "mistral:7b",
    "mixtral",
    "mixtral:8x7b",
    "phi",
    "phi:2.7b",
    "qwen",
    "qwen:7b",
    "qwen2.5",
    "deepseek-r1",
    "deepseek-r1:7b",
]

[logging]
# Phrases to filter from logs (equivalent to Python's LiteLLMFilter)
blocked_phrases = [
    "cost_calculator",
    "LiteLLM completion",
    "POST Request Sent",
]
